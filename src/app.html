    <!--
      Cold-start paint fix: paint the light wash anchor immediately on
      launch, before the CSS bundle loads, so a dark-mode device never
      flashes a black canvas during cold-start / SSR wait.

      Branded launch overlay (#fdw-launch): covers the frame during
      cold-start with the line-art cloud+bolt mark on the aurora wash
      (slice 2 — replaces the marble-era pink splash). Removed via onMount
      in +layout.svelte once hydration runs.
      FAILSAFE: CSS animation fades the overlay away after 10 s in case JS
      never runs, so it cannot cover the app permanently.
      No inline <script> — CSP blocks it (script-src 'self' only).
      Hexes here are sanctioned: pre-CSS bootstrap cannot read theme tokens;
      values mirror --bg-wash in src/lib/themes/aurora.css.
    -->
    <style>
      html {
        background-color: #fff1f6;
        color-scheme: light;
      }

      /*
        Dark cold-start paint (F1). hooks.server.ts stamps `class="dark"` onto
        <html> in the SSR response (from the fdw_mode cookie / client hint), so
        this rule matches before the CSS bundle loads — the first paint is
        already the dark canvas, no flash. Unlayered here so it beats the app
        bundle's layered [data-theme] rules for the root `background` paint.
        Hexes mirror --background / --bg-wash-anchor of the Nacht palette in
        src/lib/themes/aurora.css (pre-CSS bootstrap can't read theme tokens).
      */
      html.dark {
        background-color: #16111f;
        color-scheme: dark;
      }

      /* ── Branded launch overlay (Aurora, spec §5) ──────────────────────────
         Aurora wash field + gradient line-art cloud+bolt — matches the iOS
         splash matrix (scripts/build-splash.ts). Removed by +layout.svelte
         onMount after hydration (0.2 s fade).
         FAILSAFE: auto-hides after 10 s via fdw-launch-auto-hide animation. */
      /* prettier-ignore */
      #fdw-launch {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #fff1f6 0%, #f4eeff 52%, #ecf3ff 100%);
        /* FAILSAFE: fade to invisible after 10 s if JS never runs */
        animation: fdw-launch-auto-hide 0.3s ease-out 10s forwards;
      }

      #fdw-launch svg {
        width: min(40vw, 200px);
        height: auto;
        /* Subtle calm pulse (opacity shimmer) */
        animation: fdw-launch-pulse 2s ease-in-out infinite;
      }

      @keyframes fdw-launch-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }

      @keyframes fdw-launch-auto-hide {
        to {
          opacity: 0;
          visibility: hidden;
        }
      }

      /* Respect prefers-reduced-motion: disable the pulse, keep the failsafe */
      @media (prefers-reduced-motion: reduce) {
        #fdw-launch svg {
          animation: none;
        }
      }
    </style>

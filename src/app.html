<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="text-scale" content="scale" />

    <!--
      Cold-start paint fix (A2): paint a light surface immediately on launch,
      before the CSS bundle loads. The `color-scheme: light only` rule lives in
      app.css, which loads late, so when the installed PWA is reopened on a
      dark-mode device the webview paints a black canvas during the cold-start /
      SSR wait. This inline rule (parsed before the head placeholder below)
      makes that frame white (matching the app surface), so the gap reads as a
      brief blank rather than a black screen.

      Branded launch overlay (#fdw-launch): covers the frame during cold-start
      with the rosa cloud+bolt mark on a white background (seamless white-with-
      brand sequence). Removed via onMount in +layout.svelte once hydration runs.
      FAILSAFE: CSS animation fades the overlay away after 10 s in case JS never
      runs (error / disabled) so it cannot cover the app permanently.
      No inline <script> — CSP blocks it (script-src 'self' only).
    -->
    <style>
      html {
        background-color: #fff;
        color-scheme: light;
      }

      /* ── Branded launch overlay (Task 2.1) ─────────────────────────────────
         Covers the viewport during cold-start / SSR wait with the brand mark.
         Removed by +layout.svelte onMount after hydration (0.2 s fade).
         FAILSAFE: auto-hides after 10 s via fdw-launch-auto-hide animation. */
      #fdw-launch {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #fff;
        /* FAILSAFE: fade to invisible after 10 s if JS never runs */
        animation: fdw-launch-auto-hide 0.3s ease-out 10s forwards;
      }

      #fdw-launch svg {
        width: 96px;
        height: 96px;
        /* Subtle calm pulse (opacity shimmer) */
        animation: fdw-launch-pulse 2s ease-in-out infinite;
      }

      @keyframes fdw-launch-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }

      @keyframes fdw-launch-auto-hide {
        to {
          opacity: 0;
          visibility: hidden;
        }
      }

      /* Respect prefers-reduced-motion: disable the pulse, keep the failsafe */
      @media (prefers-reduced-motion: reduce) {
        #fdw-launch svg {
          animation: none;
        }
      }
    </style>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme color -->
    <meta name="theme-color" content="#be185d" />

    <!-- Favicon set (small-canvas: solid pink + cloud + bolt) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="alternate icon" href="/favicon.ico" />

    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!--
      black-translucent: iOS status bar overlaps the app content (transparent
      bar with black text). The app's top chrome (Topbar + public header) both
      apply safe-area-inset-top padding so content is NOT hidden behind the bar.
      Topbar.svelte uses class="safe-top …" (app.css .safe-top utility).
      Public layout header uses inline style="padding-top: max(env(safe-area-inset-top, 0px), 0.75rem)".
    -->
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="FdW" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!--
      iOS PWA splash screens (apple-touch-startup-image).
      Generated by scripts/gen-splash.ts — re-run that script when adding
      new device sizes or updating the brand mark.
      Media queries use CSS logical points (device-width / device-height) and
      -webkit-device-pixel-ratio, not physical pixels.
    -->
    <!-- iPhone SE 1st gen: 640×1136 px = 320×568 pt @2x -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/640x1136.png"
    />
    <!-- iPhone 6/7/8 & 12/13 mini: 750×1334 px = 375×667 pt @2x -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/750x1334.png"
    />
    <!-- iPhone XR / 11: 828×1792 px = 414×896 pt @2x -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/828x1792.png"
    />
    <!-- iPhone 12 / 13 / 14: 1170×2532 px = 390×844 pt @3x -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/1170x2532.png"
    />
    <!-- iPhone 15 / 16 / Pro (Dynamic Island): 1179×2556 px = 393×852 pt @3x -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/1179x2556.png"
    />
    <!-- iPhone 14 Plus: 1284×2778 px = 428×926 pt @3x -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/1284x2778.png"
    />
    <!-- iPhone 15 / 16 Plus / Pro Max (Dynamic Island): 1290×2796 px = 430×932 pt @3x -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/1290x2796.png"
    />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!--
      Branded launch overlay — visible during cold-start before hydration.
      Removed by +layout.svelte onMount (0.2 s opacity fade then DOM remove).
      FAILSAFE: CSS auto-hides it after 10 s if JS never runs.
      aria-hidden so screen readers skip the decorative splash.
    -->
    <div id="fdw-launch" aria-hidden="true">
      <!-- Brand badge — identical mark to static/favicon.svg (rosa rounded
           square, white cloud, yellow bolt) so the launch sequence
           (home-screen icon → iOS splash → this overlay) reads as one
           consistent mark. -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 64 64"
        role="img"
        aria-hidden="true"
      >
        <rect width="64" height="64" rx="12" fill="#be185d" />
        <g fill="#ffffff">
          <ellipse cx="22" cy="28" rx="9" ry="7" />
          <ellipse cx="32" cy="24" rx="11" ry="9" />
          <ellipse cx="42" cy="28" rx="9" ry="7" />
          <rect x="16" y="28" width="32" height="8" rx="4" />
        </g>
        <polygon
          points="34,30 26,46 32,46 28,56 42,38 35,38 40,30"
          fill="#facc15"
        />
      </svg>
    </div>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>

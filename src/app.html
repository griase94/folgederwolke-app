<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="text-scale" content="scale" />

    <!--
      Cold-start paint fix (A2): paint a light surface immediately on launch,
      before the CSS bundle loads. The `color-scheme: light only` rule lives in
      app.css, which loads late, so when the installed PWA is reopened on a
      dark-mode device the webview paints a black canvas during the cold-start /
      SSR wait. This inline rule (parsed before the head placeholder below)
      makes that frame white (matching the app surface), so the gap reads as a
      brief blank rather than a black screen. (An instant cached-shell launch is
      a separate, measured Tier 2 follow-up.)
    -->
    <style>
      html {
        background-color: #fff;
        color-scheme: light;
      }
    </style>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme color -->
    <meta name="theme-color" content="#be185d" />

    <!-- Favicon set (small-canvas: solid pink + cloud + bolt) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="alternate icon" href="/favicon.ico" />

    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FdW" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>

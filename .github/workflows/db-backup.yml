# DB Backup — nightly pg_dump → age-encrypt → push to private GitHub repo + Drive.
#
# Phase 7.5 full implementation. Replaces Phase 6 stub.
#
# Required GitHub Secrets:
#   DATABASE_URL_BACKUP       — Neon connection string (app_export role, direct URL)
#   BACKUP_REPO               — owner/repo of private backup repository (e.g. griase94/fdw-backups)
#   BACKUP_TOKEN              — GitHub PAT with repo write scope for BACKUP_REPO
#   BACKUP_AGE_RECIPIENT      — age public key (X25519), e.g. age1abc...
#   GOOGLE_OAUTH_CLIENT_ID    — same OAuth app as main app
#   GOOGLE_OAUTH_CLIENT_SECRET
#   GOOGLE_OAUTH_REFRESH_TOKEN
#   DRIVE_BACKUP_FOLDER_ID    — Google Drive folder ID for backup uploads
#
# Schedule: 02:30 UTC daily (before Vercel daily-dispatcher at 03:00 UTC).
# Retention: kept forever in backup repo; Drive folder managed manually.
# Encryption: age (https://github.com/FiloSottile/age) — recipient key only;
#   private key lives in 1Password, never in CI.

name: DB Backup

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    name: pg_dump → encrypt → push
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 0. Pre-flight: required secrets configured? ────────────────────────
      # Fail fast and visibly if the backup target secrets are missing. Without
      # this guard the workflow runs pg_dump for ~5s, fails with a cryptic
      # "connection to socket /var/run/postgresql/.s.PGSQL.5432 failed" (because
      # DATABASE_URL is empty and pg_dump falls back to the local socket), and
      # leaves the operator hunting through logs to figure out which secret
      # they forgot to set. This step makes the gap obvious in the run summary.
      - name: Verify required secrets
        env:
          DATABASE_URL_BACKUP: ${{ secrets.DATABASE_URL_BACKUP }}
          BACKUP_AGE_RECIPIENT: ${{ secrets.BACKUP_AGE_RECIPIENT }}
          BACKUP_REPO: ${{ secrets.BACKUP_REPO }}
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          missing=()
          [ -z "${DATABASE_URL_BACKUP}"  ] && missing+=("DATABASE_URL_BACKUP")
          [ -z "${BACKUP_AGE_RECIPIENT}" ] && missing+=("BACKUP_AGE_RECIPIENT")
          [ -z "${BACKUP_REPO}"          ] && missing+=("BACKUP_REPO")
          [ -z "${BACKUP_TOKEN}"         ] && missing+=("BACKUP_TOKEN")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Required secrets missing — backup CANNOT run: ${missing[*]}"
            {
              echo "## Backup did NOT run"
              echo ""
              echo "The following repository secrets are unset:"
              for s in "${missing[@]}"; do
                echo "- \`$s\`"
              done
              echo ""
              echo "Set via: \`gh secret set <NAME> --body '<value>'\`. See"
              echo ".github/workflows/db-backup.yml header for what each holds."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "All required secrets are set — proceeding with backup."

      # ── 1. Install tools ───────────────────────────────────────────────────
      - name: Install PostgreSQL 17 client + age
        # Neon runs Postgres 17.8. Ubuntu's default postgresql-client is 16.x,
        # and pg_dump REFUSES to dump a newer server ("server version mismatch"),
        # so the distro client silently broke nightly backups after the PG17
        # upgrade. Pin the client from the PostgreSQL apt repo — same block as
        # the ci.yml backup-test job (keep them in sync).
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release age
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-17
          pg_dump --version

      # ── 2. Dump ────────────────────────────────────────────────────────────
      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_BACKUP }}
        run: |
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          DUMP_FILE="backup-${TIMESTAMP}.dump"
          ENCRYPTED_FILE="${DUMP_FILE}.age"

          echo "TIMESTAMP=${TIMESTAMP}"      >> "$GITHUB_ENV"
          echo "DUMP_FILE=${DUMP_FILE}"      >> "$GITHUB_ENV"
          echo "ENCRYPTED_FILE=${ENCRYPTED_FILE}" >> "$GITHUB_ENV"

          pg_dump \
            --format=custom \
            --no-owner \
            --no-acl \
            "${DATABASE_URL}" \
            --file="${DUMP_FILE}"

          DUMP_SIZE=$(du -sh "${DUMP_FILE}" | cut -f1)
          echo "Dump complete: ${DUMP_FILE} (${DUMP_SIZE})"

      # ── 3. Encrypt with age ────────────────────────────────────────────────
      - name: Encrypt dump
        env:
          BACKUP_AGE_RECIPIENT: ${{ secrets.BACKUP_AGE_RECIPIENT }}
        run: |
          age --recipient "${BACKUP_AGE_RECIPIENT}" \
              --output "${ENCRYPTED_FILE}" \
              "${DUMP_FILE}"
          echo "Encryption complete: ${ENCRYPTED_FILE}"
          # Remove plaintext dump immediately after encryption
          rm -f "${DUMP_FILE}"

      # ── 4. Push to private GitHub backup repository ────────────────────────
      - name: Push to backup repository
        env:
          BACKUP_REPO: ${{ secrets.BACKUP_REPO }}
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          git clone \
            --depth=1 \
            "https://x-access-token:${BACKUP_TOKEN}@github.com/${BACKUP_REPO}.git" \
            backup-repo

          cp "${ENCRYPTED_FILE}" backup-repo/

          cd backup-repo
          git config user.email "ci-backup@folgederwolke.de"
          git config user.name "CI Backup Bot"
          git add "${ENCRYPTED_FILE}"
          git commit -m "backup: ${ENCRYPTED_FILE} (${TIMESTAMP})"
          git push

          echo "Pushed ${ENCRYPTED_FILE} to ${BACKUP_REPO}"

      # ── 5. Upload to Google Drive backup folder ────────────────────────────
      - name: Upload to Google Drive
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          DRIVE_BACKUP_FOLDER_ID: ${{ secrets.DRIVE_BACKUP_FOLDER_ID }}
        run: |
          if [ -z "${DRIVE_BACKUP_FOLDER_ID}" ] || \
             [ -z "${GOOGLE_OAUTH_CLIENT_ID}" ] || \
             [ -z "${GOOGLE_OAUTH_REFRESH_TOKEN}" ]; then
            echo "Drive credentials not fully configured — skipping Drive upload"
            exit 0
          fi

          # Obtain access token via OAuth refresh. Capture the raw response
          # into a variable first (rather than piping curl straight into an
          # interpreter) so the HTTP call and the JSON parsing are two
          # separate, independently-inspectable steps.
          TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${GOOGLE_OAUTH_CLIENT_ID}" \
            -d "client_secret=${GOOGLE_OAUTH_CLIENT_SECRET}" \
            -d "refresh_token=${GOOGLE_OAUTH_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])" <<< "${TOKEN_RESPONSE}")

          # Upload using Drive resumable upload
          UPLOAD_URL=$(curl -s -X POST \
            "https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${ENCRYPTED_FILE}\",\"parents\":[\"${DRIVE_BACKUP_FOLDER_ID}\"]}" \
            -D - | grep -i "^location:" | tr -d '\r' | cut -d' ' -f2)

          curl -s -X PUT "${UPLOAD_URL}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@${ENCRYPTED_FILE}" \
            -o /dev/null

          echo "Uploaded ${ENCRYPTED_FILE} to Drive folder ${DRIVE_BACKUP_FOLDER_ID}"

      # ── 6. Summary ─────────────────────────────────────────────────────────
      - name: Backup summary
        if: always()
        run: |
          echo "## Backup Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Timestamp: ${TIMESTAMP}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Encrypted file: ${ENCRYPTED_FILE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitHub repo: \`${BACKUP_REPO:-not configured}\`" >> "$GITHUB_STEP_SUMMARY"

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run Semgrep (OWASP Top 10 + JS + TS)
        run: |
          semgrep \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --error \
            --no-rewrite-rule-ids \
            .

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-env-files:
    name: check committed env files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Scan committed env files for real-secret patterns
        run: bash scripts/check-env-files.sh

  check-no-fdw-fallbacks:
    name: check no FdW identity fallbacks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Forbid residual FdW identity fallbacks in src/
        run: bash scripts/check-no-fdw-fallbacks.sh

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (blocking at high severity)
        # If high/critical vulnerabilities found in dev deps, document in docs/RUNBOOK.md
        # and resolve them -- do NOT suppress this gate.
        run: pnpm audit --audit-level=high

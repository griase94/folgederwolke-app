name: CI

on:
  push:
    branches: [main, "phase-*", "overnight-*"]
  pull_request:
    branches: [main, "overnight-*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-types:
    name: unit-and-types
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install psql
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Create folgederwolke_dev (matches local init.sql)
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -p 15432 -U postgres -c "CREATE DATABASE folgederwolke_dev;"

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Phase 9 — _internal* usage guard
        run: bash scripts/check-internal-del.sh

      - name: Unit tests
        run: pnpm test --run

  build:
    name: build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_PROVIDER: ${{ secrets.MAIL_PROVIDER }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # env.ts is defensive — build works with empty/missing secrets
        run: pnpm build

      - name: Bundle size gate
        # Fails if the largest client JS chunk or total client JS exceeds the
        # thresholds documented in scripts/check-bundle-size.mjs (~10 % above
        # the PR0 baseline). Locks in the pdfjs lazy-load split from a prior
        # phase; catches accidental re-bundling of large libraries.
        run: node scripts/check-bundle-size.mjs

  e2e-shard:
    name: e2e-shard
    runs-on: ubuntu-latest
    # Fan the grep-selected specs across N parallel CI runners. fail-fast:false
    # so one shard failing still lets the others finish (full signal in one run).
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install psql
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Create folgederwolke_dev (matches local init.sql)
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -p 15432 -U postgres -c "CREATE DATABASE folgederwolke_dev;"

      - name: E2E tests (cumulative phase-0…phase-9 + smoke) — shard ${{ matrix.shard }}/3
        # Cumulative grep: each phase adds its tag — @phase-0|@phase-1|...|@phase-N
        # Bare @phase-3 (admin-shell/mitglieder/member-detail/beitraege-matrix) is
        # distinct from @phase-3-routing (the three-tab flat-list specs) — both kept.
        # Phases 3-6 and 8 added: three-tab routing/ausgaben/einnahmen/spenden + export+a11y suites.
        # @smoke = cross-cutting always-on checks (smoke-authed-routes.spec.ts:
        # every primary /app section renders < 500 for an admin).
        # @phase-member-zahlung: member Beiträge-Zahlung redesign (Package F boundary).
        # --shard splits the grep-selected specs across the matrix; each shard
        # runs serially on its own postgres service + webServer (playwright
        # workers:1, fullyParallel:false), so shards stay mutually isolated.
        run: pnpm test:e2e --grep '@phase-0|@phase-1|@phase-2|@phase-3|@phase-3-routing|@phase-4-ausgaben|@phase-5-einnahmen|@phase-6-spenden|@phase-8|@phase-9|@smoke|@phase-aurora-1|@phase-aurora-slice2|@phase-aurora-slice3|@phase-aurora-slice4|@phase-aurora-inbox|@phase-aurora-slice5|@phase-member-zahlung|@phase-entry-modals|@aurora-impl-f1' --shard=${{ matrix.shard }}/3

  # Single required status check named "e2e" (branch protection requires the
  # literal context "e2e"). It aggregates the matrix: succeeds only if every
  # e2e-shard succeeded. if:always() so a shard failure yields a definitive red
  # "e2e" rather than a skip (a skipped required check blocks the merge).
  e2e:
    name: e2e
    needs: [e2e-shard]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all e2e shards passed
        run: |
          if [ "${{ needs.e2e-shard.result }}" != "success" ]; then
            echo "e2e shards result: ${{ needs.e2e-shard.result }} — failing the e2e gate."
            exit 1
          fi
          echo "All e2e shards passed."

  backup-restore-smoke:
    name: backup-restore-smoke
    runs-on: ubuntu-latest
    # Phase 7.5: smoke-test the restore pipeline on every push.
    # Uses a self-contained fixture dump — no live Neon connection required.
    # Bumped to postgres:17 in phase-8 to match Neon's 17.8 (was 16).

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install PostgreSQL 17 client
        # Ubuntu's default postgresql-client is 16.x — too old to dump our
        # postgres:17 service container ("server version mismatch"). Pull
        # version-pinned client from the PostgreSQL apt repository.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-17
          psql --version
          pg_dump --version

      - name: Run restore smoke test
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
        run: bash scripts/restore-smoke.sh

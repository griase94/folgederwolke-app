name: CI

on:
  push:
    branches: [main, "phase-*", "overnight-*"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [main, "overnight-*"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-types:
    name: unit-and-types
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install psql
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Create folgederwolke_dev (matches local init.sql)
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -p 15432 -U postgres -c "CREATE DATABASE folgederwolke_dev;"

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Phase 9 — _internal* usage guard
        run: bash scripts/check-internal-del.sh

      - name: Unit tests
        run: pnpm test --run

  build:
    name: build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_PROVIDER: ${{ secrets.MAIL_PROVIDER }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # env.ts is defensive — build works with empty/missing secrets
        run: pnpm build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Install psql
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Create folgederwolke_dev (matches local init.sql)
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -p 15432 -U postgres -c "CREATE DATABASE folgederwolke_dev;"

      - name: E2E tests (cumulative phase-0|phase-1|phase-2|phase-9)
        # Cumulative grep: each phase adds its tag — @phase-0|@phase-1|...|@phase-N
        # Phase 9 added (skipping phases 3-8 until their suites are green —
        # the grep widens as those phases are triaged).
        run: pnpm test:e2e --grep '@phase-0|@phase-1|@phase-2|@phase-9'

  backup-restore-smoke:
    name: backup-restore-smoke
    runs-on: ubuntu-latest
    # Phase 7.5: smoke-test the restore pipeline on every push.
    # Uses a self-contained fixture dump — no live Neon connection required.
    # Bumped to postgres:17 in phase-8 to match Neon's 17.8 (was 16).

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        # Ubuntu's default postgresql-client is 16.x — too old to dump our
        # postgres:17 service container ("server version mismatch"). Pull
        # version-pinned client from the PostgreSQL apt repository.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-17
          psql --version
          pg_dump --version

      - name: Run restore smoke test
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
        run: bash scripts/restore-smoke.sh
